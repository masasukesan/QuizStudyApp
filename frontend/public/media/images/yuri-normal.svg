<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 270" width="256" height="270">
  <defs>
    <!-- 肌グラデ -->
    <radialGradient id="skin" cx="45%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FFF5EE"/>
      <stop offset="100%" stop-color="#FFDECE"/>
    </radialGradient>
    <!-- 髪グラデ（ラベンダー→ピンク） -->
    <linearGradient id="hair" x1="0%" y1="0%" x2="30%" y2="100%">
      <stop offset="0%" stop-color="#C8AAEC"/>
      <stop offset="60%" stop-color="#B890E4"/>
      <stop offset="100%" stop-color="#F4B8D4"/>
    </linearGradient>
    <!-- 瞳グラデ -->
    <radialGradient id="iris" cx="35%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#D4A8F8"/>
      <stop offset="50%" stop-color="#9060D0"/>
      <stop offset="100%" stop-color="#5C30A0"/>
    </radialGradient>
    <!-- ほっぺグロー -->
    <radialGradient id="cheek" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFB8CC" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFB8CC" stop-opacity="0"/>
    </radialGradient>
    <!-- ドロップシャドウ -->
    <filter id="shadow" x="-15%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#C4A0E8" flood-opacity="0.35"/>
    </filter>
    <!-- 目の輝きフィルタ -->
    <filter id="eyeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ===== 体 ===== -->
  <!-- スカート -->
  <ellipse cx="128" cy="228" rx="44" ry="28" fill="#EDD8FA" stroke="#C9A0E8" stroke-width="3"/>
  <path d="M86 218 Q88 248 128 252 Q168 248 170 218 Q155 212 128 210 Q101 212 86 218Z"
        fill="#EDD8FA" stroke="#C9A0E8" stroke-width="3"/>
  <!-- スカートのフリル -->
  <path d="M86 222 Q98 230 110 222 Q122 230 134 222 Q146 230 158 222 Q164 228 170 222"
        fill="none" stroke="#DDB8F5" stroke-width="2" stroke-linecap="round"/>
  <!-- ブラウス -->
  <path d="M100 200 Q128 196 156 200 L158 218 Q128 210 98 218Z"
        fill="#F5E4FC" stroke="#C9A0E8" stroke-width="2.5"/>
  <!-- リボン -->
  <path d="M118 202 L128 210 L138 202 Q128 197 118 202Z" fill="#F4B8D4" stroke="#E090BB" stroke-width="1.5"/>
  <circle cx="128" cy="202" r="4" fill="#E896C0" stroke="#D070A8" stroke-width="1"/>

  <!-- 腕（左） -->
  <path d="M100 208 Q84 215 82 228 Q84 235 91 232 Q96 220 104 215Z"
        fill="#FFDECE" stroke="#F0C0A8" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- 手（左） -->
  <circle cx="85" cy="232" r="11" fill="#FFDECE" stroke="#F0C0A8" stroke-width="2"/>
  <!-- 腕（右） -->
  <path d="M156 208 Q172 215 174 228 Q172 235 165 232 Q160 220 152 215Z"
        fill="#FFDECE" stroke="#F0C0A8" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- 手（右） -->
  <circle cx="171" cy="232" r="11" fill="#FFDECE" stroke="#F0C0A8" stroke-width="2"/>

  <!-- 首 -->
  <rect x="116" y="174" width="24" height="22" rx="10" fill="#FFDECE" stroke="#F0C0A8" stroke-width="2"/>

  <!-- ===== 頭 ===== -->
  <!-- 髪（後ろ・サイドの垂れ下がり） -->
  <ellipse cx="128" cy="98" rx="78" ry="72" fill="url(#hair)"/>
  <!-- 左サイドの垂れ髪 -->
  <path d="M54 105 Q46 145 52 175 Q62 168 68 155 Q58 130 60 105Z" fill="#C8AAEC"/>
  <!-- 右サイドの垂れ髪 -->
  <path d="M202 105 Q210 145 204 175 Q194 168 188 155 Q198 130 196 105Z" fill="#C8AAEC"/>

  <!-- 頭本体 -->
  <ellipse cx="128" cy="104" rx="72" ry="74" fill="url(#skin)" stroke="#F0C0A8" stroke-width="3.5" filter="url(#shadow)"/>

  <!-- 耳 -->
  <ellipse cx="58" cy="112" rx="12" ry="15" fill="#FFDECE" stroke="#F0C0A8" stroke-width="2.5"/>
  <ellipse cx="58" cy="112" rx="7" ry="9" fill="#FFBDAA"/>
  <ellipse cx="198" cy="112" rx="12" ry="15" fill="#FFDECE" stroke="#F0C0A8" stroke-width="2.5"/>
  <ellipse cx="198" cy="112" rx="7" ry="9" fill="#FFBDAA"/>

  <!-- ===== 前髪 ===== -->
  <!-- メイン前髪 -->
  <path d="M58 100 Q62 58 128 52 Q194 58 198 100
           Q180 85 162 92 Q152 78 140 90 Q134 76 128 88 Q122 76 116 90 Q104 78 94 92 Q76 85 58 100Z"
        fill="url(#hair)" stroke="#B890E4" stroke-width="1"/>
  <!-- ハイライト（前髪） -->
  <path d="M90 80 Q108 70 126 72" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

  <!-- ===== 顔パーツ ===== -->
  <!-- 眉（左）ふんわり -->
  <path d="M92 104 Q108 98 122 103" stroke="#9060C8" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- 眉（右） -->
  <path d="M134 103 Q148 98 164 104" stroke="#9060C8" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- 目（左）大きくキラキラ -->
  <ellipse cx="107" cy="122" rx="18" ry="20" fill="white" stroke="#D0A0F0" stroke-width="2"/>
  <ellipse cx="107" cy="124" rx="14" ry="16" fill="url(#iris)"/>
  <ellipse cx="107" cy="126" rx="8" ry="9" fill="#3A1870"/>
  <!-- 星型ハイライト -->
  <circle cx="100" cy="117" r="5" fill="white" opacity="0.95" filter="url(#eyeGlow)"/>
  <circle cx="113" cy="128" r="2.5" fill="white" opacity="0.7"/>
  <circle cx="103" cy="130" r="1.5" fill="white" opacity="0.5"/>
  <!-- まつ毛 -->
  <path d="M89 110 Q94 105 100 110" stroke="#8050B8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M114 108 Q120 103 125 108" stroke="#8050B8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <line x1="107" y1="102" x2="105" y2="97" stroke="#8050B8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="114" y1="104" x2="116" y2="99" stroke="#8050B8" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 目（右）大きくキラキラ -->
  <ellipse cx="149" cy="122" rx="18" ry="20" fill="white" stroke="#D0A0F0" stroke-width="2"/>
  <ellipse cx="149" cy="124" rx="14" ry="16" fill="url(#iris)"/>
  <ellipse cx="149" cy="126" rx="8" ry="9" fill="#3A1870"/>
  <circle cx="142" cy="117" r="5" fill="white" opacity="0.95" filter="url(#eyeGlow)"/>
  <circle cx="155" cy="128" r="2.5" fill="white" opacity="0.7"/>
  <circle cx="145" cy="130" r="1.5" fill="white" opacity="0.5"/>
  <path d="M131 110 Q136 105 142 110" stroke="#8050B8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M156 108 Q162 103 167 108" stroke="#8050B8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <line x1="149" y1="102" x2="147" y2="97" stroke="#8050B8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="156" y1="104" x2="158" y2="99" stroke="#8050B8" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 鼻（点だけ） -->
  <circle cx="128" cy="140" r="2.5" fill="#F0A898" opacity="0.6"/>

  <!-- 口（やわらかいほほえみ） -->
  <path d="M116 152 Q128 162 140 152" stroke="#E890B8" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- ほっぺ（グロー） -->
  <ellipse cx="88" cy="140" rx="18" ry="13" fill="url(#cheek)"/>
  <ellipse cx="168" cy="140" rx="18" ry="13" fill="url(#cheek)"/>

  <!-- ===== ユリの花アクセ（右） ===== -->
  <g transform="translate(186,68) rotate(-5)">
    <!-- 花びら5枚 -->
    <ellipse cx="0" cy="-14" rx="7" ry="13" fill="#FFF0FA" stroke="#F4B8D8" stroke-width="1.5" transform="rotate(0)"/>
    <ellipse cx="0" cy="-14" rx="7" ry="13" fill="#FFF0FA" stroke="#F4B8D8" stroke-width="1.5" transform="rotate(72)"/>
    <ellipse cx="0" cy="-14" rx="7" ry="13" fill="#FFE4F4" stroke="#F4B8D8" stroke-width="1.5" transform="rotate(144)"/>
    <ellipse cx="0" cy="-14" rx="7" ry="13" fill="#FFE4F4" stroke="#F4B8D8" stroke-width="1.5" transform="rotate(216)"/>
    <ellipse cx="0" cy="-14" rx="7" ry="13" fill="#FFF0FA" stroke="#F4B8D8" stroke-width="1.5" transform="rotate(288)"/>
    <!-- 花芯 -->
    <circle cx="0" cy="0" r="9" fill="#FFE4A0" stroke="#F0C048" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="5" fill="#F0A828"/>
    <!-- おしべ -->
    <line x1="-3" y1="-8" x2="-4" y2="-12" stroke="#D4882A" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="0" y1="-9" x2="0" y2="-13" stroke="#D4882A" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="3" y1="-8" x2="4" y2="-12" stroke="#D4882A" stroke-width="1.2" stroke-linecap="round"/>
  </g>
  <!-- 葉 -->
  <path d="M182 72 Q172 80 168 94 Q178 84 182 72Z" fill="#80D880" stroke="#60C060" stroke-width="1"/>

  <!-- ===== 星クリップ（左） ===== -->
  <g transform="translate(72,76)">
    <polygon points="0,-12 3,-4 11,-4 5,2 7,10 0,5 -7,10 -5,2 -11,-4 -3,-4"
             fill="#FFE866" stroke="#F0C820" stroke-width="1.5"/>
    <polygon points="0,-7 2,-2 7,-2 3,1 4,6 0,3 -4,6 -3,1 -7,-2 -2,-2"
             fill="#FFF4A0"/>
  </g>

  <!-- ===== 名前 ===== -->
  <text x="128" y="264" text-anchor="middle"
        font-family="'Hiragino Maru Gothic Pro','Rounded Mplus 1c',sans-serif"
        font-size="15" font-weight="bold" fill="#9060C8">ユリちゃん</text>
</svg>
