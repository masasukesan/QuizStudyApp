<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=540">
  <title>ユリイカ リール 2026-05-30 励ましメッセージ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@200;300;400;500&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; background: #EDE5D4; display: flex; justify-content: center; align-items: flex-start; }

    .banner {
      width: 540px; height: 960px;
      position: relative; overflow: hidden; flex-shrink: 0;
      background:
        radial-gradient(ellipse 110% 70% at 50% 20%, #FFFDF5 0%, #F5EDD8 45%, #EDE0C2 100%);
    }

    .layer-grain {
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(160,120,60,0.06) 1px, transparent 1px);
      background-size: 4px 4px; pointer-events: none;
    }
    .layer-glow {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 50% at 50% 10%, rgba(215,165,55,0.14) 0%, transparent 70%);
      pointer-events: none;
    }
    .layer-vignette {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(160,120,60,0.10) 100%);
      pointer-events: none;
    }

    .frame-outer { position: absolute; inset: 22px; border: 1px solid rgba(140,95,30,0.55); pointer-events: none; }
    .frame-inner { position: absolute; inset: 28px; border: 1px solid rgba(140,95,30,0.22); pointer-events: none; }
    .crnr { position: absolute; width: 19px; height: 19px; z-index: 6; pointer-events: none; }
    .crnr-tl { top: 17px; left: 17px; border-top: 1.5px solid rgba(140,95,30,1); border-left: 1.5px solid rgba(140,95,30,1); }
    .crnr-tr { top: 17px; right: 17px; border-top: 1.5px solid rgba(140,95,30,1); border-right: 1.5px solid rgba(140,95,30,1); }
    .crnr-bl { bottom: 17px; left: 17px; border-bottom: 1.5px solid rgba(140,95,30,1); border-left: 1.5px solid rgba(140,95,30,1); }
    .crnr-br { bottom: 17px; right: 17px; border-bottom: 1.5px solid rgba(140,95,30,1); border-right: 1.5px solid rgba(140,95,30,1); }

    .series-tag { position: absolute; top: 44px; left: 48px; font-family: 'Cormorant Garamond', serif; font-size: 9px; letter-spacing: 0.45em; text-transform: uppercase; color: rgba(140,95,30,0.70); z-index: 10; }

    .layout { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 55px 56px; z-index: 10; }

    .rule { width: 100%; display: flex; align-items: center; gap: 9px; }
    .rule.mb { margin-bottom: 26px; }
    .rule.mt { margin-top: 26px; }
    .r-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(140,95,30,0.70), transparent); }
    .r-dia { width: 4.5px; height: 4.5px; background: rgba(140,95,30,0.90); transform: rotate(45deg); flex-shrink: 0; }
    .r-dot { width: 2.5px; height: 2.5px; border-radius: 50%; background: rgba(140,95,30,0.55); flex-shrink: 0; }

    .sub-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px; letter-spacing: 0.50em; text-transform: uppercase;
      color: rgba(140,95,30,0.75); margin-bottom: 20px;
    }

    /* メインメッセージ */
    .main-quote {
      text-align: center;
      margin-bottom: 28px;
    }
    .quote-en {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px; letter-spacing: 0.40em;
      color: rgba(140,95,30,0.55); margin-bottom: 18px;
    }
    .quote-jp {
      display: block;
      font-family: 'Noto Serif JP', serif;
      font-weight: 500; font-size: 24px;
      letter-spacing: 0.18em; line-height: 1.75;
      color: #3A2208;
    }

    /* 3つのポイントカード */
    .points-wrap { width: 100%; display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }

    .point-card {
      width: 100%;
      border: 1px solid rgba(140,95,30,0.30);
      padding: 16px 20px;
      display: flex; align-items: center; gap: 16px;
      background: rgba(255,252,240,0.68);
    }
    .point-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px; font-weight: 500;
      color: rgba(140,95,30,0.75);
      flex-shrink: 0; width: 22px; text-align: center;
    }
    .point-text {
      font-family: 'Noto Serif JP', serif;
      font-weight: 400; font-size: 14px;
      letter-spacing: 0.16em; line-height: 1.8;
      color: #3A2208;
    }

    /* 締めライン */
    .close-line {
      width: 100%;
      border-top: 1px solid rgba(140,95,30,0.25);
      border-bottom: 1px solid rgba(140,95,30,0.25);
      padding: 15px 0;
      text-align: center;
      background: rgba(215,175,80,0.06);
      margin-bottom: 4px;
    }
    .cl-text {
      font-family: 'Noto Serif JP', serif;
      font-weight: 400; font-size: 14px;
      letter-spacing: 0.20em; color: #4A3010;
      line-height: 1.9;
    }
    .cl-sub {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 10px; letter-spacing: 0.40em;
      color: rgba(140,95,30,0.60); margin-top: 6px;
    }

    /* LINE CTA */
    .line-cta {
      width: 100%;
      background: rgba(255,252,240,0.80);
      border: 1px solid rgba(140,95,30,0.45);
      padding: 14px 18px;
      text-align: center;
      margin-top: 18px;
    }
    .line-cta-main {
      display: block;
      font-family: 'Noto Serif JP', serif;
      font-weight: 500; font-size: 13px;
      letter-spacing: 0.18em; color: #3A2208;
      line-height: 1.85;
    }
    .line-cta-arrow {
      display: inline-block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px; letter-spacing: 0.35em;
      color: rgba(140,95,30,0.70); margin-top: 4px;
    }

    /* スクールマーク */
    .mark { margin-top: 14px; text-align: center; }
    .mark-en { display: block; font-family: 'Cormorant Garamond', serif; font-size: 10px; font-weight: 400; letter-spacing: 0.62em; color: rgba(140,95,30,0.90); text-transform: uppercase; }
    .mark-jp { display: block; font-family: 'Noto Serif JP', serif; font-weight: 200; font-size: 9px; letter-spacing: 0.38em; color: rgba(140,95,30,0.60); margin-top: 9px; }
  </style>
</head>
<body>
<div class="banner">
  <div class="layer-grain"></div>
  <div class="layer-glow"></div>
  <div class="layer-vignette"></div>
  <div class="frame-outer"></div>
  <div class="frame-inner"></div>
  <div class="crnr crnr-tl"></div><div class="crnr crnr-tr"></div>
  <div class="crnr crnr-bl"></div><div class="crnr crnr-br"></div>
  <div class="series-tag">Weekend Message — Step by Step</div>

  <div class="layout">

    <div class="sub-label">Saturday Message</div>

    <div class="rule mb">
      <div class="r-dot"></div><div class="r-line"></div>
      <div class="r-dia"></div>
      <div class="r-line"></div><div class="r-dot"></div>
    </div>

    <div class="main-quote">
      <span class="quote-en">— One small step at a time —</span>
      <span class="quote-jp">焦らなくていい。<br>今日の一歩が、<br>必ず力になる。</span>
    </div>

    <div class="points-wrap">

      <div class="point-card">
        <span class="point-num">1</span>
        <span class="point-text">今日やったことを<br>ひとつ書き出してみよう</span>
      </div>

      <div class="point-card">
        <span class="point-num">2</span>
        <span class="point-text">「できた」を<br>小さくても数えていこう</span>
      </div>

      <div class="point-card">
        <span class="point-num">3</span>
        <span class="point-text">週末のリセットが<br>来週の自分を助けてくれる</span>
      </div>

    </div>

    <div class="close-line">
      <span class="cl-text">みんなのペースで、一緒に進もう。</span>
      <span class="cl-sub">We grow together, at your own pace.</span>
    </div>

    <div class="rule mt">
      <div class="r-dot"></div><div class="r-line"></div>
      <div class="r-dia"></div>
      <div class="r-line"></div><div class="r-dot"></div>
    </div>

    <div class="line-cta">
      <span class="line-cta-main">プロフィールの公式ラインから、<br>無料体験授業受付中！</span>
      <span class="line-cta-arrow">▷ プロフィールをチェック</span>
    </div>

    <div class="mark">
      <span class="mark-en">E U R E K A</span>
      <span class="mark-jp">個別指導学習塾　ユリイカ</span>
    </div>

  </div>
</div>
</body>
</html>
